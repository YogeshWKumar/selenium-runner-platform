name: Stable Selenium Runner

on:
  workflow_dispatch:
    inputs:
      code:
        required: true

jobs:
  run-selenium:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout repo
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 2. Install Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Install Chrome
      # =========================
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      # =========================
      # 4. Download Selenium JAR (stable)
      # =========================
      - name: Download Selenium
        run: |
          mkdir libs
          curl -L -o libs/selenium.jar https://repo1.maven.org/maven2/org/seleniumhq/selenium/selenium-java/4.20.0/selenium-java-4.20.0.jar

      # =========================
      # 5. Write Java file
      # =========================
      - name: Write Java Code
        run: |
          echo "${{ github.event.inputs.code }}" > Main.java

      # =========================
      # 6. Compile
      # =========================
      - name: Compile
        run: |
          javac -cp "libs/*" Main.java

      # =========================
      # 7. Run
      # =========================
      - name: Run Selenium
        run: |
          java -cp ".:libs/*" Main
