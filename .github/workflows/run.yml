name: Selenium MVP Runner

on:
  workflow_dispatch:
    inputs:
      code:
        required: true
        description: "Java Selenium Code"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || true

      - name: Write Java file
        run: |
          cat << 'EOF' > Main.java
          ${{ github.event.inputs.code }}
          EOF

      - name: Compile Java
        run: javac Main.java

      - name: Run Selenium / Java
        run: java Main | tee output.txt

      - name: Show Output
        run: cat output.txt
