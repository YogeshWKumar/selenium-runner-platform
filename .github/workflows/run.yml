name: Stable Selenium Runner

on:
  workflow_dispatch:
    inputs:
      code:
        required: true

jobs:
  run-selenium:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout repo
      # =========================
      - uses: actions/checkout@v4

      # =========================
      # 2. Install Java
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # 3. Install Chrome
      # =========================
      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt install -y ./google-chrome-stable_current_amd64.deb

      # =========================
      # 4. Download Selenium Full Bundle
      # =========================
      - name: Download Selenium Full Bundle
        run: |
          mkdir libs
          curl -L -o libs/selenium.zip https://github.com/SeleniumHQ/selenium/releases/download/selenium-4.20.0/selenium-java-4.20.0.zip
          unzip libs/selenium.zip -d libs
          
      # =========================
      # 5. Write Java file
      # =========================
      - name: Write Java Code safely
        run: |
          cat << 'EOF' > Main.java
          ${{ github.event.inputs.code }}
          EOF
          
      # =========================
      # 6. Compile
      # =========================
      - name: Compile
        run: |
          javac -cp "libs/*" Main.java

      # =========================
      # 7. Run
      # =========================
      - name: Run Selenium
        run: |
          mkdir -p results
          java -cp ".:libs/*" Main > results/execution.log 2>&1

      # =========================
      # 7. Upload Results
      # =========================
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-results
          path: results/
